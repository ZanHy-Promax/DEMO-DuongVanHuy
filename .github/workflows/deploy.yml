name: Build and Push Docker Image

on:
  push:
    branches:
      - main # Chạy tự động khi có code push lên nhánh main

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/docker-demo:latest
            ${{ secrets.DOCKER_USERNAME }}/docker-demo:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/docker-demo:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/docker-demo:buildcache,mode=max
