version: '3.8'

services:
  # ==========================================
  # MySQL Database
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: dockerdemo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: dockerdemo
      MYSQL_USER: demouser
      MYSQL_PASSWORD: ""
    ports:
      - "3307:3306"   # Dùng 3307 vì Laragon chiếm 3306
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - dockerdemo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ==========================================
  # Spring Boot Application
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker-demo-app:latest
    container_name: dockerdemo-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: dockerdemo
      MYSQL_USER: root
      MYSQL_PASSWORD: ""
      SERVER_PORT: 8080
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - dockerdemo-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ==========================================
# Networks
# ==========================================
networks:
  dockerdemo-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  mysql_data:
    driver: local
