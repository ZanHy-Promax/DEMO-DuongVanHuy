version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker-demo-app:latest
    container_name: dockerdemo-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
